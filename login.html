<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoteVault – Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <!-- Animated background -->
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="auth-wrapper">

    <!-- Brand -->
    <div class="brand">
      <span class="brand-icon">📓</span>
      <span class="brand-name">NoteVault</span>
    </div>
    <p class="brand-tagline">Your private, personal notes — always secure.</p>

    <!-- Card -->
    <div class="auth-card">

      <!-- Tab strip -->
      <div class="tab-strip">
        <button class="tab active" data-tab="email">✉ Email</button>
        <button class="tab" data-tab="phone">📱 Phone</button>
        <button class="tab" data-tab="oauth">🔗 Social</button>
      </div>

      <!-- ── EMAIL TAB ── -->
      <div class="tab-content active" id="tab-email">

        <!-- Sub-toggle: Login / Register -->
        <div class="subtoggle">
          <button class="stab active" id="emailLoginBtn">Sign In</button>
          <button class="stab" id="emailRegBtn">Create Account</button>
        </div>

        <!-- Login form -->
        <form id="emailLoginForm" class="auth-form" autocomplete="off">
          <div class="field-group">
            <label>Email</label>
            <input type="email" id="elEmail" placeholder="you@example.com" required />
          </div>
          <div class="field-group">
            <label>Password</label>
            <div class="pw-wrap">
              <input type="password" id="elPassword" placeholder="••••••••" required />
              <button type="button" class="pw-toggle" data-target="elPassword">👁</button>
            </div>
          </div>
          <button type="submit" class="btn-primary">Sign In →</button>
        </form>

        <!-- Register form -->
        <form id="emailRegForm" class="auth-form hidden" autocomplete="off">
          <div class="field-group">
            <label>Full Name</label>
            <input type="text" id="erName" placeholder="Your name" />
          </div>
          <div class="field-group">
            <label>Email</label>
            <input type="email" id="erEmail" placeholder="you@example.com" required />
          </div>
          <div class="field-group">
            <label>Password</label>
            <div class="pw-wrap">
              <input type="password" id="erPassword" placeholder="Min 6 characters" required />
              <button type="button" class="pw-toggle" data-target="erPassword">👁</button>
            </div>
          </div>
          <button type="submit" class="btn-primary">Create Account →</button>
        </form>

      </div>

      <!-- ── PHONE TAB ── -->
      <div class="tab-content hidden" id="tab-phone">

        <div class="subtoggle">
          <button class="stab active" id="phoneLoginBtn">Sign In</button>
          <button class="stab" id="phoneRegBtn">Create Account</button>
        </div>

        <!-- Phone Login -->
        <form id="phoneLoginForm" class="auth-form" autocomplete="off">
          <div class="field-group">
            <label>Phone Number</label>
            <input type="tel" id="plPhone" placeholder="+91 9876543210" required />
          </div>
          <div class="field-group">
            <label>Password</label>
            <div class="pw-wrap">
              <input type="password" id="plPassword" placeholder="••••••••" required />
              <button type="button" class="pw-toggle" data-target="plPassword">👁</button>
            </div>
          </div>
          <button type="submit" class="btn-primary">Sign In →</button>
        </form>

        <!-- Phone Register -->
        <form id="phoneRegForm" class="auth-form hidden" autocomplete="off">
          <div class="field-group">
            <label>Full Name</label>
            <input type="text" id="prName" placeholder="Your name" />
          </div>
          <div class="field-group">
            <label>Phone Number</label>
            <input type="tel" id="prPhone" placeholder="+91 9876543210" required />
          </div>
          <div class="field-group">
            <label>Password</label>
            <div class="pw-wrap">
              <input type="password" id="prPassword" placeholder="Min 6 characters" required />
              <button type="button" class="pw-toggle" data-target="prPassword">👁</button>
            </div>
          </div>
          <button type="submit" class="btn-primary">Create Account →</button>
        </form>

      </div>

      <!-- ── SOCIAL TAB ── -->
      <div class="tab-content hidden" id="tab-oauth">
        <p class="oauth-hint">Sign in with your existing account — no password needed.</p>
        <a class="btn-oauth google" href="/api/auth/google">
          <svg viewBox="0 0 48 48" width="20" height="20"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </a>
        <a class="btn-oauth github" href="/api/auth/github">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
          Continue with GitHub
        </a>
        <div class="oauth-note">
          <span>🔐 OAuth requires Google/GitHub app setup in <code>.env</code></span>
        </div>
      </div>

      <!-- Error / Success toast inside card -->
      <div class="auth-toast hidden" id="authToast"></div>

    </div><!-- end auth-card -->

    <p class="footer-note">🔒 Your notes are private. Only you can see them.</p>

  </div><!-- end auth-wrapper -->

  <script>
    const API = 'http://localhost:5000/api';

    // ── Tab switching ──────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.remove('hidden');
        clearToast();
      });
    });

    // ── Subtoggle helpers ──────────────────────────────────────
    function setupSubtoggle(loginBtn, regBtn, loginForm, regForm) {
      loginBtn.addEventListener('click', () => {
        loginBtn.classList.add('active'); regBtn.classList.remove('active');
        loginForm.classList.remove('hidden'); regForm.classList.add('hidden');
        clearToast();
      });
      regBtn.addEventListener('click', () => {
        regBtn.classList.add('active'); loginBtn.classList.remove('active');
        regForm.classList.remove('hidden'); loginForm.classList.add('hidden');
        clearToast();
      });
    }
    setupSubtoggle(
      document.getElementById('emailLoginBtn'), document.getElementById('emailRegBtn'),
      document.getElementById('emailLoginForm'), document.getElementById('emailRegForm')
    );
    setupSubtoggle(
      document.getElementById('phoneLoginBtn'), document.getElementById('phoneRegBtn'),
      document.getElementById('phoneLoginForm'), document.getElementById('phoneRegForm')
    );

    // ── Password toggle ────────────────────────────────────────
    document.querySelectorAll('.pw-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const inp = document.getElementById(btn.dataset.target);
        inp.type = inp.type === 'password' ? 'text' : 'password';
        btn.textContent = inp.type === 'password' ? '👁' : '🙈';
      });
    });

    // ── Toast ──────────────────────────────────────────────────
    const authToast = document.getElementById('authToast');
    function showToast(msg, isError = true) {
      authToast.textContent = msg;
      authToast.className = 'auth-toast ' + (isError ? 'err' : 'ok');
    }
    function clearToast() { authToast.className = 'auth-toast hidden'; }

    // ── Save token & redirect ──────────────────────────────────
    function handleAuthSuccess(data) {
      localStorage.setItem('nv_token', data.token);
      localStorage.setItem('nv_user',  JSON.stringify(data.user));
      if (!data.user.profile_done) {
        window.location.href = '/profile-setup.html';
      } else {
        window.location.href = '/';
      }
    }

    // ── Check URL error ────────────────────────────────────────
    const urlErr = new URLSearchParams(location.search).get('error');
    if (urlErr) showToast(`OAuth failed: ${urlErr.replace('_', ' ')}. Check .env config.`);

    // ── Check URL token (from OAuth redirect) ─────────────────
    const urlToken = new URLSearchParams(location.search).get('token');
    if (urlToken) {
      localStorage.setItem('nv_token', urlToken);
      window.location.href = '/profile-setup.html';
    }

    // ── Generic fetch helper ───────────────────────────────────
    async function authFetch(path, body) {
      const res = await fetch(API + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      return res.json().then(d => ({ ok: res.ok, data: d }));
    }

    // ── Email Login ────────────────────────────────────────────
    document.getElementById('emailLoginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const { ok, data } = await authFetch('/auth/login', {
        email:    document.getElementById('elEmail').value.trim(),
        password: document.getElementById('elPassword').value,
      });
      if (!ok) return showToast(data.error || 'Login failed');
      handleAuthSuccess(data);
    });

    // ── Email Register ─────────────────────────────────────────
    document.getElementById('emailRegForm').addEventListener('submit', async e => {
      e.preventDefault();
      const { ok, data } = await authFetch('/auth/register', {
        name:     document.getElementById('erName').value.trim(),
        email:    document.getElementById('erEmail').value.trim(),
        password: document.getElementById('erPassword').value,
      });
      if (!ok) return showToast(data.error || 'Registration failed');
      handleAuthSuccess(data);
    });

    // ── Phone Login ────────────────────────────────────────────
    document.getElementById('phoneLoginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const { ok, data } = await authFetch('/auth/login/phone', {
        phone:    document.getElementById('plPhone').value.trim(),
        password: document.getElementById('plPassword').value,
      });
      if (!ok) return showToast(data.error || 'Login failed');
      handleAuthSuccess(data);
    });

    // ── Phone Register ─────────────────────────────────────────
    document.getElementById('phoneRegForm').addEventListener('submit', async e => {
      e.preventDefault();
      const { ok, data } = await authFetch('/auth/register/phone', {
        name:     document.getElementById('prName').value.trim(),
        phone:    document.getElementById('prPhone').value.trim(),
        password: document.getElementById('prPassword').value,
      });
      if (!ok) return showToast(data.error || 'Registration failed');
      handleAuthSuccess(data);
    });
  </script>
</body>
</html>

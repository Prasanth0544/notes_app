<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NoteVault – Your Daily Notes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Sync Status Banner (mobile only) -->
  <div class="sync-banner hidden" id="syncBanner"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-row">
        <div class="logo">
          <span class="logo-icon">📓</span>
          <span class="logo-text">NoteVault</span>
        </div>
        <button class="btn-theme" id="btnTheme" title="Toggle light/dark mode">☀️</button>
      </div>

      <!-- User profile strip -->
      <div class="user-strip" id="userStrip" tabindex="0">
        <div class="user-strip-content">
          <div class="user-avatar" id="userAvatar">?</div>
          <div class="user-info">
            <div class="user-name" id="userName">Loading…</div>
            <div class="user-role" id="userRole"></div>
          </div>
          <span class="user-menu-icon">⋮</span>
        </div>
        <!-- Dropdown menu -->
        <div class="user-dropdown" id="userDropdown">
          <button class="dropdown-item danger" id="btnLogout">
            <span class="dropdown-icon">⏏</span> Sign out
          </button>
        </div>
      </div>

      <button class="btn-new" id="btnNewNote" title="New Note">＋ New Note</button>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search notes…" autocomplete="off" />
    </div>

    <div class="notes-list-label">Notes</div>
    <ul class="notes-list" id="notesList"></ul>
  </aside>

  <!-- Main editor -->
  <main class="main" id="main">
    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📝</div>
      <h2>No note selected</h2>
      <p>Select a note from the sidebar or create a new one.</p>
      <button class="btn-new-lg" id="btnNewNoteLg">＋ Create your first note</button>
    </div>

    <!-- Editor panel -->
    <div class="editor-panel" id="editorPanel" style="display:none">
      <div class="editor-topbar">
        <input type="text" class="note-title-input" id="noteTitleInput" placeholder="Note title…" />
        <div class="topbar-actions">
          <span class="note-date" id="noteDate"></span>
          <button class="btn-icon danger" id="btnDeleteNote" title="Delete note">🗑️</button>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar" id="toolbar">
        <button class="tb-btn" data-cmd="bold" title="Bold"><b>B</b></button>
        <button class="tb-btn" data-cmd="italic" title="Italic"><i>I</i></button>
        <button class="tb-btn" data-cmd="underline" title="Underline"><u>U</u></button>
        <button class="tb-btn" data-cmd="strikeThrough" title="Strike"><s>S</s></button>
        <span class="tb-divider"></span>
        <button class="tb-btn" data-cmd="insertUnorderedList" title="Bullet list">≡ •</button>
        <button class="tb-btn" data-cmd="insertOrderedList" title="Numbered list">≡ 1</button>
        <span class="tb-divider"></span>
        <button class="tb-btn" data-cmd="h1" title="Heading 1">H1</button>
        <button class="tb-btn" data-cmd="h2" title="Heading 2">H2</button>
        <button class="tb-btn" data-cmd="h3" title="Heading 3">H3</button>
        <span class="tb-divider"></span>
        <select class="tb-select" id="fontSizeSel" title="Font size">
          <option value="1">Tiny</option>
          <option value="2">Small</option>
          <option value="3" selected>Normal</option>
          <option value="4">Large</option>
          <option value="5">XL</option>
          <option value="6">XXL</option>
        </select>
        <input type="color" class="tb-color" id="fontColor" title="Text color" value="#e2e8f0" />
        <span class="tb-divider"></span>
        <button class="tb-btn" data-cmd="justifyLeft" title="Align left">⬅</button>
        <button class="tb-btn" data-cmd="justifyCenter" title="Align center">↔</button>
        <button class="tb-btn" data-cmd="justifyRight" title="Align right">➡</button>
        <span class="tb-divider"></span>
        <button class="tb-btn" id="btnInsertImg" title="Insert image from file">🖼️ Image</button>
        <button class="tb-btn" id="btnInsertLink" title="Insert link">🔗 Link</button>
        <button class="tb-btn" data-cmd="removeFormat" title="Clear formatting">✕ Format</button>
        <span class="tb-divider"></span>
        <button class="tb-btn" id="btnUndo" title="Undo">↩ Undo</button>
        <button class="tb-btn" id="btnRedo" title="Redo">↪ Redo</button>
        <span class="tb-divider"></span>
        <button class="tb-btn tb-save" id="btnSave" title="Save (Ctrl+S)">💾 Save</button>
        <button class="tb-btn tb-saveas" id="btnSaveAs" title="Save As — download to your PC">📥Download</button>
      </div>

      <!-- Content editable -->
      <div class="editor-body" id="editorBody" contenteditable="true"
           spellcheck="true"
           data-placeholder="Start writing… paste text and images freely 🚀">
      </div>

      <!-- Tags row -->
      <div class="tags-row">
        <span class="tags-label">Tags:</span>
        <div class="tags-container" id="tagsContainer">
          <input type="text" id="tagsInput" placeholder="Type a tag & press Enter" class="tags-input" />
        </div>
      </div>

      <!-- Status bar -->
      <div class="statusbar">
        <span id="wordCount">0 words</span>
        <span id="saveStatus" class="save-ok">✔ Saved</span>
      </div>
    </div>
  </main>

  <!-- Image file picker (hidden) -->
  <input type="file" id="imgFilePicker" accept="image/*" style="display:none" multiple />

  <!-- Unsaved Changes Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="modal-icon">⚠️</div>
      <h3 class="modal-title">Unsaved Changes</h3>
      <p class="modal-msg">You have unsaved changes. What would you like to do?</p>
      <div class="modal-actions">
        <button class="modal-btn primary" id="modalSave">💾 Save &amp; Continue</button>
        <button class="modal-btn danger"   id="modalDiscard">🗑 Don't Save</button>
        <button class="modal-btn secondary" id="modalCancel">✕ Cancel</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/@capacitor/core@latest/dist/capacitor.js"></script>
  <script src="app.js"></script>
</body>
</html>
